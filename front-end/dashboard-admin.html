<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padawan ON </title>
<link rel="stylesheet" href="dashboard-admin.css">

</head>

<body>


    <aside class="sidebar">
    <h2 class="logo">Padawan ON</h2>

    <nav class="menu">

    <button onclick="showSection('dashboard')">Dashboard</button>

    <button onclick="showSection('usuarios')">Usuários</button>

    <button onclick="showSection('vinculos')">Vínculos</button>

    <button onclick="showSection('encontros')">Encontros</button>

    <button onclick="showSection('grupos')">Grupos</button>

    <button onclick="showSection('chat')">Chat</button>

    <button onclick="logout()">Sair</button>

    </nav>

    </aside>


    <main class="content">


    <section id="dashboard" class="section active">

    <h1>Dashboard</h1>

    <div id="dashboard-data"></div>

    </section>


    <section id="usuarios" class="section">

    <h1>Usuários</h1>

    <table id="usuarios-table">

    <thead>

    <tr>

    <th>Nome</th>
    <th>Email</th>
    <th>Tipo</th>

    </tr>

    </thead>

    <tbody>


    </tbody>

    </table>

    </section>

    <section id="vinculos" class="section">

    <h1>Vínculos</h1>

    <div id="vinculos-list">


    </div>

    </section>


    <section id="encontros" class="section">

    <h1>Encontros</h1>

    <table id="encontros-table">

    <thead>

    <tr>

    <th>Mentor</th>
    <th>Calouro</th>
    <th>Data</th>
    <th>Duração</th>

    </tr>

    </thead>

    <tbody>


    </tbody>

    </table>

    </section>



    <section id="grupos" class="section">

    <h1>Grupos</h1>

    <div id="grupos-list">

    </div>

    </section>


    <section id="chat" class="section">

    <h1>Chat</h1>

    <div id="chat-container">


    </div>

    </section>

    </main>


    <script src="script.js"></script>

</body>

</html>
